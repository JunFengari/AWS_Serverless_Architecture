AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB tables for KasvihuoneKanta project with preloaded data

Resources:
    # DynamoDB table Kasvihuoneet
    KasvihuoneetTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: Kasvihuoneet
            BillingMode: PAY_PER_REQUEST
            AttributeDefinitions:
                - AttributeName: KasvihuoneID
                  AttributeType: S
                - AttributeName: AikaLeima
                  AttributeType: S
            KeySchema:
                - AttributeName: KasvihuoneID
                  KeyType: HASH
                - AttributeName: AikaLeima
                  KeyType: RANGE

    # DynamoDB table Halytykset
    HalytyksetTable:
        Type: AWS::DynamoDB::Table
        Properties:
            TableName: Halytykset
            BillingMode: PAY_PER_REQUEST
            AttributeDefinitions:
                - AttributeName: Halytys
                  AttributeType: S
                - AttributeName: AikaLeima
                  AttributeType: S
            KeySchema:
                - AttributeName: Halytys
                  KeyType: HASH
                - AttributeName: AikaLeima
                  KeyType: RANGE

    # Lambda function to populate tables
    PopulateLambda:
        Type: AWS::Lambda::Function
        Properties:
            FunctionName: PopulateDynamoData
            Runtime: nodejs18.x
            Handler: index.handler
            Role: !GetAtt PopulateLambdaRole.Arn
            Code:
                ZipFile: |
                    const AWS = require('aws-sdk');
                    const dynamo = new AWS.DynamoDB.DocumentClient();
                    exports.handler = async (event) => {
                        const tableName = event.TableName;
                        const items = event.Items;
                        for (const item of items) {
                            await dynamo.put({ TableName: tableName, Item: item }).promise();
                        }
                        return { Status: 'Success' };
                    };

    # IAM Role for Lambda
    PopulateLambdaRole:
        Type: AWS::IAM::Role
        Properties:
            RoleName: PopulateLambdaRole
            AssumeRolePolicyDocument:
                Version: '2012-10-17'
                Statement:
                    - Effect: Allow
                      Principal:
                          Service: lambda.amazonaws.com
                      Action: sts:AssumeRole
            Policies:
                - PolicyName: DynamoPutPolicy
                  PolicyDocument:
                      Version: '2012-10-17'
                      Statement:
                          - Effect: Allow
                            Action:
                                - dynamodb:PutItem
                            Resource: '*'

    # Custom Resource to populate Kasvihuoneet table
    PopulateKasvihuoneet:
        Type: Custom::PopulateKasvihuoneet
        Properties:
            ServiceToken: !GetAtt PopulateLambda.Arn
            TableName: !Ref KasvihuoneetTable
            Items:
